security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\PublicUser: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
        public_user_provider:
            entity:
                class: App\Entity\PublicUser
                property: phone

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        public:
            pattern: ^/(login/public|register/public|conference)
            provider: public_user_provider
            form_login:
                login_path: app_login_public
                check_path: app_login_public
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout_public
                target: app_login_public

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\LoginSuccessHandler
            logout:
                path: app_logout
                target: app_login

    access_control:
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/conferencier, roles: ROLE_CONFERENCIER }
        - { path: ^/conference/.*/comment, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10